<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>나랑 갇히러 갈사람</title>
  <style>
    @font-face {
      font-family: "Nanum Myeongjo";
      src: url("./fonts/NanumMyeongjo.otf") format("opentype");
      font-weight: 400 900;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Pretendard";
      src: url("./fonts/Pretendard-Regular.woff2") format("woff2");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Pretendard Bold";
      src: url("./fonts/Pretendard-Bold.woff2") format("woff2");
      font-weight: 700 900;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Museum Classic B";
      src: url("./fonts/MuseumClassicB.otf") format("opentype");
      font-weight: 700 900;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Museum Classic M";
      src: url("./fonts/MuseumClassicM.otf") format("opentype");
      font-weight: 400 700;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Griun Gyuwon";
      src: url("./fonts/Griun_Gyuwon-Rg.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Cafe24 Ohsquare Air";
      src: url("./fonts/Cafe24OhsquareAir-v2.0.woff2") format("woff2");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Binggrae2";
      src: url("./fonts/Binggrae2.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Binggrae2 Bold";
      src: url("./fonts/Binggrae2-Bold.ttf") format("truetype");
      font-weight: 700 900;
      font-style: normal;
      font-display: swap;
    }

    :root {
      color-scheme: light;
      --bg: #f6f6f2;
      --ink: #20201d;
      --muted: #68665f;
      --line: #d7d3c8;
      --panel: #ffffff;
      --panel-2: #efede6;
      --red: #b43c36;
      --teal: #1f756f;
      --gold: #b9822f;
      --black: #151512;
      --focus: 0 0 0 3px rgba(31, 117, 111, .24);
      font-family: "Nanum Myeongjo", "Malgun Gothic", "Apple SD Gothic Neo", serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(90deg, rgba(32, 32, 29, .018) 1px, transparent 1px) 0 0 / 42px 42px,
        linear-gradient(rgba(32, 32, 29, .015) 1px, transparent 1px) 0 0 / 42px 42px,
        var(--bg);
      color: var(--ink);
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(320px, 400px) minmax(0, 1fr);
      grid-template-rows: minmax(0, 1fr) auto;
    }

    .controls {
      min-height: 0;
      padding: 28px;
      background: var(--panel);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    .brand-mark {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 1.35rem;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .brand-kicker {
      margin: 0 0 4px;
      color: var(--muted);
      font-size: .86rem;
      font-weight: 750;
      line-height: 1.3;
    }

    .brand small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: .84rem;
      line-height: 1.4;
    }

    .field-group {
      display: grid;
      gap: 14px;
    }

    .section-title {
      margin: 0 0 2px;
      font-size: .82rem;
      letter-spacing: .08em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .entry-list {
      display: grid;
      gap: 12px;
    }

    .entry-card {
      border: 1px solid #d8d1c4;
      border-radius: 8px;
      background: #fbfaf6;
      padding: 14px;
      display: grid;
      gap: 12px;
      box-shadow: 0 1px 0 rgba(32, 32, 29, .04);
    }

    .entry-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .entry-title {
      color: var(--muted);
      font-size: .82rem;
      font-weight: 800;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .entry-fields {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
    }

    .entry-fields .field {
      min-width: 0;
      gap: 5px;
    }

    .entry-fields .field:nth-child(3) {
      max-width: 150px;
    }

    .entry-fields label {
      font-size: .84rem;
    }

    .entry-fields input {
      min-height: 40px;
      padding: 8px 10px;
    }

    .remove-entry {
      width: 30px;
      height: 30px;
      min-height: 30px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #f7f4ed;
      color: #70685d;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: background .16s ease, color .16s ease, border-color .16s ease;
    }

    .remove-entry:hover {
      background: #eee7dd;
      border-color: #c9bdad;
      color: var(--ink);
    }

    label {
      color: #35332e;
      font-size: .92rem;
      font-weight: 700;
    }

    input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: #fbfaf6;
      color: var(--ink);
      outline: none;
      transition: border-color .16s ease, box-shadow .16s ease, background .16s ease;
    }

    input:focus {
      border-color: var(--teal);
      box-shadow: var(--focus);
      background: #ffffff;
    }

    .style-options {
      display: grid;
      gap: 9px;
    }

    .style-option {
      position: relative;
      min-height: 58px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfaf6;
      color: var(--ink);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      font-weight: 850;
      text-align: left;
      transition: border-color .16s ease, background .16s ease, color .16s ease, transform .16s ease;
    }

    .style-option:hover {
      transform: translateY(-1px);
      border-color: rgba(32, 32, 29, .4);
    }

    .style-option.is-active {
      background: #1d1917;
      color: #fffaf0;
      border-color: #b98258;
      box-shadow: inset 0 0 0 2px rgba(217, 173, 85, .38);
    }

    .style-option.is-active::after {
      content: "";
      width: 8px;
      height: 14px;
      border-right: 2px solid #fffaf0;
      border-bottom: 2px solid #fffaf0;
      transform: rotate(45deg);
      margin-left: 2px;
    }

    .style-swatch {
      width: 54px;
      height: 28px;
      border-radius: 6px;
      background: linear-gradient(90deg, #0f7774 0 36%, #8f2f37 36% 68%, #d3b98f 68%);
      box-shadow: inset 0 0 0 2px rgba(0, 0, 0, .35);
      flex: 0 0 auto;
    }

    .style-swatch.memory {
      background: linear-gradient(90deg, #f8ead6 0 42%, #56321f 42% 72%, #c99a6c 72%);
    }

    .style-swatch.napolitan {
      background: linear-gradient(90deg, #1a0503 0 24%, #7a0502 24% 66%, #7a4b24 66%);
    }

    .style-swatch.oddbar {
      background:
        linear-gradient(135deg, transparent 0 44%, #db3dff 45% 49%, transparent 50%),
        linear-gradient(30deg, transparent 0 52%, #31f05b 53% 58%, transparent 59%),
        linear-gradient(90deg, #020202 0 30%, #ffe538 30% 36%, #111 36% 64%, #35dff0 64% 70%, #050505 70%);
    }

    .style-swatch.allbox {
      background:
        linear-gradient(0deg, transparent 0 44%, rgba(11, 26, 34, .75) 45% 55%, transparent 56%),
        linear-gradient(90deg, #075f78 0 42%, #d5b33d 42% 58%, #1a2529 58% 78%, #0a6f8f 78%);
    }

    .style-swatch.dearfriend {
      background:
        linear-gradient(90deg, #171714 0 6%, transparent 6% 94%, #171714 94%),
        repeating-linear-gradient(90deg, #21b9af 0 13px, #e4c66b 13px 19px, #ef5960 19px 23px, #6ad4ce 23px 43px);
    }

    .style-note {
      margin-left: auto;
      color: rgba(32, 32, 29, .54);
      font-size: .78rem;
      font-weight: 750;
    }

    .style-option.is-active .style-note {
      color: rgba(255, 250, 240, .58);
    }

    .remove-entry:focus-visible,
    .save-button:focus-visible,
    .icon-button:focus-visible,
    .style-option:focus-visible {
      outline: none;
      box-shadow: var(--focus);
    }

    .actions {
      grid-column: 1;
      grid-row: 2;
      display: grid;
      gap: 10px;
      padding: 18px 28px 28px;
      background: var(--panel);
      border-top: 1px solid var(--line);
      border-right: 1px solid var(--line);
    }

    .action-status {
      min-height: 20px;
      color: var(--muted);
      font-size: .86rem;
      line-height: 1.35;
      text-align: center;
    }

    .preview-hint {
      color: var(--muted);
      font-weight: 650;
      font-size: .88rem;
      line-height: 1.35;
      text-align: right;
    }

    .actions {
      border-top: 1px solid var(--line);
    }

    .save-button,
    .icon-button {
      min-height: 46px;
      border: 0;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      transition: transform .16s ease, filter .16s ease;
    }

    .save-button:hover,
    .icon-button:hover {
      transform: translateY(-1px);
    }

    .save-button:active,
    .icon-button:active {
      transform: translateY(0);
    }

    .save-button {
      background: var(--red);
      color: #fffaf0;
      font-weight: 800;
    }

    .icon-button {
      background: #e9e5da;
      color: var(--ink);
      font-weight: 750;
    }

    .reset-button {
      background: transparent;
      border: 1px solid #e3ded3;
      color: var(--muted);
      font-weight: 700;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    svg {
      flex: 0 0 auto;
    }

    .stage {
      grid-column: 2;
      grid-row: 1 / span 2;
      min-width: 0;
      min-height: 100vh;
      padding: 28px;
      display: grid;
      place-items: center;
    }

    .preview-shell {
      width: min(100%, clamp(320px, calc(80vh - 88px), 860px));
      display: grid;
      gap: 14px;
    }

    .preview-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: .9rem;
    }

    .preview-size {
      color: #34322e;
      font-weight: 750;
    }

    .canvas-frame {
      width: 100%;
      aspect-ratio: 4 / 5;
      border: 1px solid rgba(32, 32, 29, .22);
      border-radius: 8px;
      overflow: hidden;
      background: #171714;
      box-shadow: 0 22px 60px rgba(38, 35, 27, .18);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    @media (max-width: 980px) {
      .app {
        display: flex;
        flex-direction: column;
      }

      .controls {
        min-height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .stage {
        order: 2;
        min-height: auto;
        padding-top: 18px;
      }

      .preview-shell {
        width: min(100%, 760px);
      }

      .canvas-frame {
        max-height: none;
      }

      .actions {
        order: 3;
        padding: 18px 28px 28px;
        border-right: 0;
      }
    }

    @media (max-width: 560px) {
      .controls,
      .stage {
        padding: 18px;
      }

      .brand {
        align-items: flex-start;
      }

      .button-row {
        grid-template-columns: 1fr 1fr;
      }

      .preview-toolbar {
        align-items: center;
        flex-direction: row;
      }

      .preview-hint {
        text-align: right;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="controls" aria-label="초대장 입력">
      <header class="brand">
        <div class="brand-mark">
          <div>
            <p class="brand-kicker">방탈출 초대장 이미지 생성기</p>
            <h1>나랑 갇히러 갈사람</h1>
            <small>By 달물결</small>
          </div>
        </div>
      </header>

      <div class="field-group">
        <p class="section-title">Invitation</p>
        <div class="field">
          <label for="inviteTitle">초대장 제목</label>
          <input id="inviteTitle" maxlength="34" placeholder="초대합니다" autocomplete="off">
        </div>
      </div>

      <div class="field-group">
        <p class="section-title">Rooms</p>
        <div class="entry-list" id="entryList" aria-label="매장, 테마, 가격 목록"></div>
        <button class="icon-button" type="button" id="addEntryButton" title="항목 추가">
          <svg width="17" height="17" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          </svg>
          항목 추가
        </button>
      </div>

      <div class="field-group">
        <p class="section-title">Style</p>
        <div class="style-options" role="group" aria-label="초대장 스타일 선택">
          <button class="style-option is-active" type="button" data-style="napolitan" aria-pressed="true">
            <span class="style-swatch napolitan" aria-hidden="true"></span>
            나폴리탄
            <span class="style-note">red frame</span>
          </button>
          <button class="style-option" type="button" data-style="memory" aria-pressed="false">
            <span class="style-swatch memory" aria-hidden="true"></span>
            메모리컴퍼니
            <span class="style-note">memory ticket</span>
          </button>
          <button class="style-option" type="button" data-style="shortline" aria-pressed="false">
            <span class="style-swatch" aria-hidden="true"></span>
            단편선
            <span class="style-note">ink poster</span>
          </button>
          <button class="style-option" type="button" data-style="oddbar" aria-pressed="false">
            <span class="style-swatch oddbar" aria-hidden="true"></span>
            오드바
            <span class="style-note">neon bar</span>
          </button>
          <button class="style-option" type="button" data-style="allbox" aria-pressed="false">
            <span class="style-swatch allbox" aria-hidden="true"></span>
            올더박스파라다이스
            <span class="style-note">blue wall</span>
          </button>
          <button class="style-option" type="button" data-style="dearfriend" aria-pressed="false">
            <span class="style-swatch dearfriend" aria-hidden="true"></span>
            디어마이프렌드
            <span class="style-note">letter pop</span>
          </button>
        </div>
      </div>

    </section>

    <section class="stage" aria-label="초대장 미리보기">
      <div class="preview-shell">
        <div class="preview-toolbar">
          <span class="preview-size">1080 × 1350 PNG</span>
          <span class="preview-hint">입력 즉시 반영</span>
        </div>
        <div class="canvas-frame">
          <canvas id="inviteCanvas" width="1080" height="1350" aria-label="생성된 방탈출 초대장"></canvas>
        </div>
      </div>
    </section>

    <section class="actions" aria-label="이미지 저장과 복사">
      <div class="action-status" id="statusText" aria-live="polite">미리보기 준비됨</div>
      <button class="save-button" type="button" id="saveButton">
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 3v11m0 0 4-4m-4 4-4-4M5 19h14" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        PNG 저장
      </button>
      <div class="button-row">
        <button class="icon-button" type="button" id="copyButton" title="이미지 복사">
          <svg width="17" height="17" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 8h11v11H8zM5 16V5h11" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          </svg>
          복사
        </button>
        <button class="icon-button reset-button" type="button" id="resetButton" title="기본값 복원">
          <svg width="17" height="17" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 12a8 8 0 1 0 2.3-5.7M4 5v5h5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          초기화
        </button>
      </div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("inviteCanvas");
    const ctx = canvas.getContext("2d");
    const fields = {
      inviteTitle: document.getElementById("inviteTitle")
    };
    const entryList = document.getElementById("entryList");
    const addEntryButton = document.getElementById("addEntryButton");
    const statusText = document.getElementById("statusText");
    const saveButton = document.getElementById("saveButton");
    const copyButton = document.getElementById("copyButton");
    const resetButton = document.getElementById("resetButton");
    const styleButtons = [...document.querySelectorAll("[data-style]")];
    const memoryBorderImage = new Image();
    memoryBorderImage.decoding = "async";
    memoryBorderImage.src = "./assets/memory-company-border-upscaled.png";
    memoryBorderImage.addEventListener("load", () => renderInvite());
    const napolitanFrameImage = new Image();
    napolitanFrameImage.decoding = "async";
    napolitanFrameImage.src = "./assets/napolitan-frame-upscaled.png";
    napolitanFrameImage.addEventListener("load", () => renderInvite());

    let nextEntryId = 1;
    let activeStyle = "napolitan";
    let oddbarFontLoaded = false;
    let oddbarFontLoading = false;
    let allboxFontLoaded = false;
    let allboxFontLoading = false;
    let dearfriendFontLoaded = false;
    let dearfriendFontLoading = false;
    const roomDisplayLimit = 10;

    const palette = {
      ink: "#20201d",
      softInk: "#34302a",
      paper: "#f3ede1",
      paper2: "#fffaf0",
      brass: "#c08a36",
      red: "#b43c36",
      teal: "#1f756f",
      smoke: "#151512"
    };

    function titleValue() {
      return fields.inviteTitle.value.trim();
    }

    function displayTitle() {
      return titleValue() || fields.inviteTitle.placeholder;
    }

    function createEntry(values = {}) {
      const entry = document.createElement("div");
      entry.className = "entry-card";
      entry.dataset.entryId = String(nextEntryId);
      entry.innerHTML = `
        <div class="entry-header">
          <span class="entry-title">ROOM ${String(nextEntryId).padStart(2, "0")}</span>
          <button class="remove-entry" type="button" title="항목 삭제" aria-label="항목 삭제">
            <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 6l12 12M18 6 6 18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <div class="entry-fields">
          <div class="field">
            <label>매장</label>
            <input data-field="store" maxlength="36" placeholder="매장명" autocomplete="off">
          </div>
          <div class="field">
            <label>테마</label>
            <input data-field="theme" maxlength="38" placeholder="테마명" autocomplete="off">
          </div>
          <div class="field">
            <label>가격</label>
            <input data-field="price" maxlength="28" placeholder="가격" autocomplete="off">
          </div>
        </div>
      `;
      nextEntryId += 1;
      entryList.appendChild(entry);

      entry.querySelector('[data-field="store"]').value = values.store || "";
      entry.querySelector('[data-field="theme"]').value = values.theme || "";
      entry.querySelector('[data-field="price"]').value = values.price || "";
      entry.querySelectorAll("input").forEach((input) => {
        input.addEventListener("input", () => {
          renderInvite();
          markChanged();
        });
      });
      entry.querySelector(".remove-entry").addEventListener("click", () => {
        if (entryList.children.length === 1) {
          entry.querySelectorAll("input").forEach((input) => {
            input.value = "";
          });
        } else {
          const label = entry.querySelector(".entry-title").textContent;
          if (!window.confirm(`${label} 삭제할까요?`)) return;
          entry.remove();
          renumberEntries();
        }
        renderInvite();
        markChanged();
      });

      renumberEntries();
      renderInvite();
    }

    function renumberEntries() {
      [...entryList.children].forEach((entry, index) => {
        entry.querySelector(".entry-title").textContent = `ROOM ${String(index + 1).padStart(2, "0")}`;
      });
    }

    function getEntries() {
      return [...entryList.querySelectorAll(".entry-card")]
        .map((entry) => ({
          store: entry.querySelector('[data-field="store"]').value.trim(),
          theme: entry.querySelector('[data-field="theme"]').value.trim(),

    function hexToRgb(hex) {
      const clean = hex.replace("#", "");
      return {

        g: parseInt(clean.slice(2, 4), 16),
        b: parseInt(clean.slice(4, 6), 16)
      };

    function fillRoundRect(x, y, w, h, r) {
      ctx.beginPath();

      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
      ctx.fill();
    }

    function strokeRoundRect(x, y, w, h, r) {

      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
      ctx.stroke();
    }

    function drawText(text, x, y, options = {}) {
      const {
        size = 44,
        weight = 700,
        color = palette.paper2,
        align = "left",
        baseline = "alphabetic",
        family = inviteFont
      } = options;
      ctx.font = `${weight} ${size}px ${family}`;
      ctx.fillStyle = color;
      ctx.textAlign = align;
      ctx.textBaseline = baseline;
      ctx.fillText(text, x, y);
    }

    function fitSize(text, maxWidth, baseSize, minSize, weight = 800, family = inviteFont) {
      let size = baseSize;
      while (size > minSize) {
        ctx.font = `${weight} ${size}px ${family}`;
        if (ctx.measureText(text).width <= maxWidth) return size;
        size -= 2;
      }
      return minSize;
    }

    function wrapLines(text, maxWidth, size, weight = 800, family = inviteFont) {
      ctx.font = `${weight} ${size}px ${family}`;
      const chars = [...text];
      const lines = [];
      let current = "";
      chars.forEach((char) => {
        const test = current + char;
        if (ctx.measureText(test).width > maxWidth && current) {
          lines.push(current);
          current = char.trimStart();
        } else {
          current = test;
        }
      });
      if (current) lines.push(current);
      return lines.slice(0, 3);
    }

    function drawCenteredWrapped(text, x, y, maxWidth, baseSize, minSize, lineGap, color, family = inviteFont, weight = 800) {
      let size = baseSize;
      let lines = wrapLines(text, maxWidth, size, weight, family);
      while ((lines.length > 2 || lines.some((line) => {
        ctx.font = `${weight} ${size}px ${family}`;
        return ctx.measureText(line).width > maxWidth;
      })) && size > minSize) {
        size -= 2;
        lines = wrapLines(text, maxWidth, size, weight, family);
      }
      ctx.font = `${weight} ${size}px ${family}`;
      ctx.fillStyle = color;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      const total = (lines.length - 1) * (size + lineGap);
      lines.forEach((line, index) => {
        ctx.fillText(line, x, y - total / 2 + index * (size + lineGap));
      });
    }

    function drawSpacedText(text, x, y, spacing, options = {}) {
      const {
        size = 24,
        weight = 700,
        color = palette.ink,
        align = "center",
        baseline = "middle",
        family = memoryFont
      } = options;
      ctx.save();
      ctx.font = `${weight} ${size}px ${family}`;
      ctx.fillStyle = color;
      ctx.textBaseline = baseline;
      const width = [...text].reduce((sum, char, index) => sum + ctx.measureText(char).width + (index ? spacing : 0), 0);
      let cursor = align === "center" ? x - width / 2 : align === "right" ? x - width : x;
      [...text].forEach((char, index) => {
        if (index) cursor += spacing;
        ctx.fillText(char, cursor, y);
        cursor += ctx.measureText(char).width;
      });
      ctx.restore();
    }

    function roughLine(x1, y1, x2, y2, color, width = 2, jitter = 1.4) {
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      for (let i = 1; i <= 7; i += 1) {
        const t = i / 7;
        const wobble = Math.sin(i * 12.31 + x1 * .01 + y2 * .01) * jitter;
        ctx.lineTo(x1 + (x2 - x1) * t + wobble, y1 + (y2 - y1) * t - wobble * .6);
      }
      ctx.stroke();
      ctx.restore();
    }

    function hatchRect(x, y, w, h, step, color, alpha = 1, angle = 0, width = 2) {
      ctx.save();
      ctx.beginPath();
      ctx.rect(x, y, w, h);
      ctx.clip();
      ctx.translate(x + w / 2, y + h / 2);
      ctx.rotate(angle);
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      const span = Math.max(w, h) * 1.6;
      for (let line = -span; line <= span; line += step) {
        ctx.beginPath();
        ctx.moveTo(-span, line);
        ctx.lineTo(span, line + Math.sin(line * .03) * 3);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawNineSliceImage(image, dx, dy, dw, dh, sourceMargin, targetMargin) {
      const iw = image.naturalWidth || image.width;
      const ih = image.naturalHeight || image.height;
      const sm = sourceMargin;
      const tm = Math.min(targetMargin, dw / 2 - 1, dh / 2 - 1);
      const centerSw = iw - sm * 2;
      const centerSh = ih - sm * 2;
      const centerDw = dw - tm * 2;
      const centerDh = dh - tm * 2;

      ctx.drawImage(image, 0, 0, sm, sm, dx, dy, tm, tm);
      ctx.drawImage(image, iw - sm, 0, sm, sm, dx + dw - tm, dy, tm, tm);
      ctx.drawImage(image, 0, ih - sm, sm, sm, dx, dy + dh - tm, tm, tm);
      ctx.drawImage(image, iw - sm, ih - sm, sm, sm, dx + dw - tm, dy + dh - tm, tm, tm);

      ctx.drawImage(image, sm, 0, centerSw, sm, dx + tm, dy, centerDw, tm);
      ctx.drawImage(image, sm, ih - sm, centerSw, sm, dx + tm, dy + dh - tm, centerDw, tm);
      ctx.drawImage(image, 0, sm, sm, centerSh, dx, dy + tm, tm, centerDh);
      ctx.drawImage(image, iw - sm, sm, sm, centerSh, dx + dw - tm, dy + tm, tm, centerDh);
      ctx.drawImage(image, sm, sm, centerSw, centerSh, dx + tm, dy + tm, centerDw, centerDh);
    }

      bg.addColorStop(0, c.blueLight);
      bg.addColorStop(.38, "#035f85");
      bg.addColorStop(.72, "#034766");
      bg.addColorStop(1, c.blueDeep);
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.save();
      ctx.globalAlpha = .31;
      ctx.strokeStyle = c.blueDark;
      ctx.lineWidth = 2;
      for (let y = 24; y < canvas.height; y += 38) {
        roughLine(0, y, canvas.width, y + Math.sin(y * .018) * 4, c.blueDark, 1.6, 1.1);
      }
      ctx.globalAlpha = .24;
      for (let y = 44; y < canvas.height; y += 76) {
        const offset = Math.floor(y / 76) % 2 ? 66 : 12;
        for (let x = offset; x < canvas.width; x += 132) {
          roughLine(x, y - 18, x + Math.sin(x * .03) * 3, y + 18, c.blueDark, 1.2, .9);
        }
      }
      ctx.restore();

      ctx.save();
      for (let i = 0; i < 1800; i += 1) {
        const x = (i * 67) % canvas.width;
        const y = (i * 149) % canvas.height;
        const alpha = .052 + ((i * 17) % 50) / 1150;
        ctx.fillStyle = i % 3 ? `rgba(0, 16, 28, ${alpha})` : `rgba(231, 222, 168, ${alpha * .42})`;
        ctx.fillRect(x, y, 1 + (i % 3), 1);
      }
      ctx.restore();

      const vignette = ctx.createRadialGradient(540, 620, 260, 540, 670, 820);
      vignette.addColorStop(0, "rgba(255,255,255,0)");
      vignette.addColorStop(1, "rgba(0,0,0,.42)");
      ctx.fillStyle = vignette;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawAllboxFrame(x, y, w, h, accent = allbox.yellow) {
      const c = allbox;
      ctx.save();
      ctx.fillStyle = "rgba(0, 0, 0, .28)";
      ctx.fillRect(x + 12, y + 14, w, h);
      ctx.fillStyle = c.charcoal;
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = c.black;
      ctx.lineWidth = 8;
      ctx.strokeRect(x, y, w, h);
      ctx.strokeStyle = accent;
      ctx.lineWidth = 4;
      ctx.strokeRect(x + 12, y + 12, w - 24, h - 24);
      ctx.fillStyle = "rgba(255, 255, 255, .04)";
      ctx.fillRect(x + 18, y + 18, w - 36, h - 36);
      ctx.restore();
    }

    function drawAllboxShutter(x, y, w, h) {
      const c = allbox;
      ctx.save();
      ctx.fillStyle = "#2e3a3f";
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = "rgba(8, 12, 14, .72)";
      ctx.lineWidth = 2;
      for (let lineY = y + 16; lineY < y + h - 10; lineY += 18) {
        ctx.beginPath();
        ctx.moveTo(x + 10, lineY);
        ctx.lineTo(x + w - 10, lineY);
        ctx.stroke();
      }
      hatchRect(x, y, w, h, 16, c.white, .035, -.35, 1);
      ctx.restore();
    }

    function drawAllboxRoomPanel(entry, index, x, y, w, h) {
      const c = allbox;
      const theme = entry.theme || "테마명";
      const store = entry.store || "매장명";
      const price = entry.price || "가격";
      const accent = index % 2 ? c.yellow : c.charcoal;
      const large = w > 620;

      drawAllboxFrame(x, y, w, h, index % 2 ? c.yellow : c.blueLight);
      drawAllboxShutter(x + 22, y + 24, w - 44, h - 48);

      ctx.save();
      ctx.globalAlpha = entry.placeholder ? .66 : 1;
      ctx.fillStyle = "rgba(4, 9, 11, .66)";
      ctx.fillRect(x + 34, y + 44, w - 68, h - 88);
      ctx.strokeStyle = rgba(index % 2 ? c.yellow : c.blueLight, .72);
      ctx.lineWidth = 2;
      ctx.strokeRect(x + 34, y + 44, w - 68, h - 88);
      ctx.restore();

      drawAllboxText(`0${index + 1}`, x + 58, y + 60, {
        size: large ? 34 : 27,
        minSize: 18,
        color: c.yellow,
        align: "left",
        baseline: "middle",
        shadow: false
      });
      drawAllboxText(theme, x + w / 2, y + h / 2 - 20, {
        size: large ? 58 : 40,
        minSize: large ? 30 : 23,
        color: c.white,
        maxWidth: w - 140
      });
      drawAllboxText(store, x + w / 2, y + h / 2 + (large ? 42 : 28), {
        size: large ? 30 : 22,
        minSize: 15,
        color: c.yellow,
        maxWidth: w - 150,
        shadow: false
      });
      drawAllboxText(price, x + w - 56, y + h - 52, {
        size: large ? 34 : 26,
        minSize: 17,
        color: accent === c.yellow ? c.yellow : c.white,
        align: "right",
        maxWidth: large ? 230 : 170
      });
    }

    function drawAllboxTitle() {
      const c = allbox;
      drawAllboxWrappedText(displayTitle(), 540, 178, 920, 92, 48, 8, c.yellow);
      roughLine(220, 310, 860, 310, c.yellowDark, 4, 1.5);
    }

    function drawAllboxEntries(entries) {
      const visible = entries.slice(0, 4);
      const positions = visible.length <= 1
        ? [[116, 558, 848, 292]]
        : visible.length <= 2
          ? [[116, 456, 848, 266], [116, 764, 848, 266]]
          : [
            [72, 462, 444, 246],
            [564, 462, 444, 246],
            [72, 754, 444, 246],
            [564, 754, 444, 246]
          ];
      visible.forEach((entry, index) => {
        drawAllboxRoomPanel(entry, index, ...positions[index]);
      });

      if (entries.length > visible.length) {
        drawAllboxText(`외 ${entries.length - visible.length}개 더`, 540, 1088, {
          size: 24,
          minSize: 18,
          color: allbox.cream,
          maxWidth: 260,
          shadow: false
        });
      }
    }

    function drawAllboxFooter() {
      const c = allbox;
      drawAllboxText("나랑 갇히러 갈사람", 540, 1235, {
        size: 38,
        minSize: 26,
        color: c.yellow,
        maxWidth: 640
      });
    }

    function drawAllboxPoster() {
      drawAllboxWallTexture();
      drawAllboxTitle();
      drawAllboxEntries(displayEntries());
      drawAllboxFooter();
    }

    function drawDearfriendText(text, x, y, options = {}) {
      const {
        size = 44,
        minSize = 24,
        color = dearfriend.ink,
        align = "center",
        baseline = "middle",
        maxWidth = null,
        family = dearfriendBodyFont,
        weight = 400,
        strokeColor = null,
        strokeWidth = 0,
        shadowColor = null,
        shadowOffset = 0
      } = options;
      const fittedSize = maxWidth ? fitSize(text, maxWidth, size, minSize, weight, family) : size;
      ctx.save();
      ctx.font = `${weight} ${fittedSize}px ${family}`;
      ctx.textAlign = align;
      ctx.textBaseline = baseline;
      if (shadowColor && shadowOffset) {
        ctx.fillStyle = shadowColor;
        ctx.fillText(text, x + shadowOffset, y + shadowOffset);
      }
      if (strokeColor && strokeWidth) {
        ctx.lineJoin = "round";
        ctx.strokeStyle = strokeColor;
        ctx.lineWidth = strokeWidth;
        ctx.strokeText(text, x, y);
      }
      ctx.fillStyle = color;
      ctx.fillText(text, x, y);
      ctx.restore();
      return fittedSize;
    }

    function drawDearfriendWrappedTitle(text, x, y, maxWidth) {
      let size = 74;
      let lines = wrapLines(text, maxWidth, size, 900, dearfriendTitleFont);
      while ((lines.length > 2 || lines.some((line) => {
        ctx.font = `900 ${size}px ${dearfriendTitleFont}`;
        return ctx.measureText(line).width > maxWidth;
      })) && size > 38) {
        size -= 2;
        lines = wrapLines(text, maxWidth, size, 900, dearfriendTitleFont);
      }
      const total = (lines.length - 1) * (size + 4);
      lines.forEach((line, index) => {
        drawDearfriendText(line, x, y - total / 2 + index * (size + 4), {
          size,
          minSize: 38,
          color: dearfriend.pink,
          family: dearfriendTitleFont,
          weight: 900,
          maxWidth,
          strokeColor: dearfriend.redDark,
          strokeWidth: Math.max(3, size * .08),
          shadowColor: "rgba(74, 37, 48, .35)",
          shadowOffset: 5
        });
      });
    }

    function drawDearfriendBackground() {
      const c = dearfriend;
      ctx.fillStyle = c.teal;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const stripes = [
        [0, c.teal],
        [34, c.tealLight],
        [72, c.yellow],
        [92, c.red],
        [102, c.mint],
        [156, c.teal],
        [208, c.tealLight],
        [244, c.yellow],
        [266, c.red],
        [278, c.mint]
      ];
      for (let x = -20; x < canvas.width + 280; x += 300) {
        stripes.forEach(([offset, color]) => {
          const width = color === c.yellow ? 18 : color === c.red ? 8 : 34;
          ctx.fillStyle = color;
          ctx.fillRect(x + offset, 0, width, canvas.height);
          ctx.fillStyle = "rgba(22, 22, 22, .18)";
          ctx.fillRect(x + offset + width - 2, 0, 2, canvas.height);
        });
      }

      ctx.save();
      ctx.globalAlpha = .13;
      for (let i = 0; i < 2200; i += 1) {
        const x = (i * 71) % canvas.width;
        const y = (i * 137) % canvas.height;
        ctx.fillStyle = i % 2 ? "#184843" : "#fff1c8";
        ctx.fillRect(x, y, 1 + (i % 2), 1);
      }
      ctx.restore();

      ctx.save();
      ctx.strokeStyle = c.black;
      ctx.lineWidth = 14;
      ctx.strokeRect(16, 16, canvas.width - 32, canvas.height - 32);
      ctx.strokeStyle = c.redDark;
      ctx.lineWidth = 8;
      ctx.strokeRect(28, 28, canvas.width - 56, canvas.height - 56);
      ctx.strokeStyle = c.cream;
      ctx.lineWidth = 3;
      ctx.strokeRect(44, 44, canvas.width - 88, canvas.height - 88);
      ctx.restore();
    }

    function drawEnvelope(x, y, w, h, angle = 0, label = "") {
      const c = dearfriend;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      ctx.fillStyle = c.paper;
      ctx.strokeStyle = "rgba(74, 37, 48, .58)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.rect(-w / 2, -h / 2, w, h);
      ctx.fill();
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-w / 2, -h / 2);
      ctx.lineTo(0, 5);
      ctx.lineTo(w / 2, -h / 2);
      ctx.moveTo(-w / 2, h / 2);
      ctx.lineTo(-2, 0);
      ctx.lineTo(w / 2, h / 2);
      ctx.stroke();
      if (label) {
        drawDearfriendText(label, 0, 2, {
          size: 11,
          minSize: 8,
          color: c.brown,
          maxWidth: w - 12,
          family: dearfriendBodyFont,
          shadowOffset: 0
        });
      }
      ctx.restore();
    }

    function drawDearfriendMailbox() {
      const c = dearfriend;
      ctx.save();
      ctx.translate(172, 988);
      ctx.fillStyle = "rgba(20, 56, 51, .35)";
      ctx.beginPath();
      ctx.ellipse(98, 210, 150, 22, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = c.redDark;
      fillRoundRect(20, 54, 210, 244, 18);
      ctx.fillStyle = c.red;
      fillRoundRect(52, 24, 216, 264, 24);
      ctx.fillStyle = c.coral;
      ctx.beginPath();
      ctx.moveTo(52, 68);
      ctx.quadraticCurveTo(86, 0, 172, 24);
      ctx.quadraticCurveTo(260, 48, 268, 120);
      ctx.lineTo(268, 288);
      ctx.lineTo(52, 288);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = c.redDark;
      ctx.lineWidth = 8;
      ctx.stroke();

      ctx.fillStyle = c.red;
      fillRoundRect(96, 166, 118, 74, 6);
      ctx.strokeStyle = c.redDark;
      ctx.lineWidth = 5;
      strokeRoundRect(96, 166, 118, 74, 6);
      ctx.fillStyle = c.redDark;
      fillRoundRect(98, 122, 116, 24, 5);
      ctx.fillStyle = c.cream;
      ctx.beginPath();
      ctx.arc(126, 100, 22, 0, Math.PI * 2);
      ctx.arc(188, 100, 22, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = c.black;
      ctx.beginPath();
      ctx.arc(135, 94, 12, 0, Math.PI * 2);
      ctx.arc(197, 94, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = c.paper;
      ctx.beginPath();
      ctx.arc(140, 88, 6, 0, Math.PI * 2);
      ctx.arc(202, 88, 6, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = c.redDark;
      ctx.beginPath();
      ctx.ellipse(162, 130, 42, 28, 0, 0, Math.PI);
      ctx.fill();
      drawEnvelope(160, 135, 78, 42, -.08);
      drawEnvelope(234, 210, 84, 48, .28);
      drawEnvelope(292, 274, 96, 54, -.2, "초대장");
      drawEnvelope(76, 310, 90, 48, -.05);
      drawEnvelope(226, 330, 82, 44, .12);
      ctx.restore();
    }

    function drawDearfriendEntries(entries) {
      const c = dearfriend;
      const x = 227;
      const y = 438;
      const w = 626;
      const h = 622;
      const visible = entries.slice(0, roomDisplayLimit);

      ctx.save();
      ctx.fillStyle = "rgba(255, 251, 225, .94)";
      fillRoundRect(x, y, w, h, 14);
      ctx.strokeStyle = c.redDark;
      ctx.lineWidth = 6;
      strokeRoundRect(x, y, w, h, 14);
      ctx.strokeStyle = c.coral;
      ctx.lineWidth = 3;
      strokeRoundRect(x + 14, y + 14, w - 28, h - 28, 10);
      hatchRect(x + 22, y + 22, w - 44, h - 44, 18, c.teal, .05, -.5, 1);

      drawDearfriendText("LETTER LIST", x + w / 2, y + 48, {
        size: 28,
        minSize: 20,
        color: c.red,
        family: dearfriendTitleFont,
        weight: 900,
        strokeColor: c.redDark,
        strokeWidth: 2,
        maxWidth: 260,
        shadowOffset: 0
      });
      roughLine(x + 58, y + 82, x + w - 58, y + 82, c.redDark, 2, .8);

      const rowH = 48;
      visible.forEach((entry, index) => {
        const rowY = y + 122 + index * rowH;
        const theme = entry.theme || "테마명";
        const store = entry.store || "매장명";
        const price = entry.price || "가격";

        ctx.fillStyle = index % 2 ? "rgba(39, 190, 181, .16)" : "rgba(239, 78, 84, .1)";
        fillRoundRect(x + 34, rowY - 22, w - 68, 40, 8);
        drawDearfriendText(String(index + 1).padStart(2, "0"), x + 70, rowY, {
          size: 16,
          minSize: 12,
          color: c.redDark,
          align: "left",
          family: dearfriendBodyFont,
          maxWidth: 34,
          shadowOffset: 0
        });
        drawDearfriendText(theme, x + 112, rowY - 8, {
          size: 23,
          minSize: 14,
          color: c.ink,
          align: "left",
          family: dearfriendTitleFont,
          weight: 900,
          maxWidth: 330,
          shadowOffset: 0
        });
        drawDearfriendText(store, x + 114, rowY + 15, {
          size: 13,
          minSize: 9,
          color: c.brown,
          align: "left",
          family: dearfriendBodyFont,
          maxWidth: 330,
          shadowOffset: 0
        });
        drawDearfriendText(price, x + w - 42, rowY + 2, {
          size: 17,
          minSize: 10,
          color: c.redDark,
          align: "right",
          family: dearfriendBodyFont,
          maxWidth: 106,
          shadowOffset: 0
        });
      });

      if (entries.length > visible.length) {
        drawDearfriendText(`외 ${entries.length - visible.length}개 더`, x + w / 2, y + h - 26, {
          size: 17,
          minSize: 12,
          color: c.redDark,
          family: dearfriendBodyFont,
          maxWidth: 240,
          shadowOffset: 0
        });
      }
      ctx.restore();
    }

    function drawDearfriendPoster() {
      const c = dearfriend;
      drawDearfriendBackground();
      drawDearfriendText("SINCE 2026", 540, 86, {
        size: 18,
        minSize: 14,
        color: c.redDark,
        family: dearfriendBodyFont,
        maxWidth: 220,
        shadowOffset: 0
      });
      drawDearfriendWrappedTitle(displayTitle(), 540, 190, 820);
      drawDearfriendText("ESCAPE ROOM INVITATION", 540, 298, {
        size: 24,
        minSize: 16,
        color: c.redDark,
        family: dearfriendBodyFont,
        maxWidth: 520,
        shadowColor: c.cream,
        shadowOffset: 2
      });
      drawDearfriendEntries(displayEntries());
      drawDearfriendText("나랑 갇히러 갈사람", 540, 1192, {
        size: 34,
        minSize: 22,
        color: c.red,
        family: dearfriendTitleFont,
        weight: 900,
        maxWidth: 640,
        strokeColor: c.redDark,
        strokeWidth: 2,
        shadowColor: c.cream,
        shadowOffset: 3
      });
      drawNoise(.018);
    }

    function ensureOddbarFontLoaded() {
      if (!document.fonts || oddbarFontLoaded || oddbarFontLoading) return;
      oddbarFontLoading = true;
      document.fonts.load(oddbarFontLoadSpec, "오늘 밤 오드바 나랑 갇히러 갈사람").then((loadedFaces) => {
        oddbarFontLoaded = loadedFaces.length > 0;
        oddbarFontLoading = false;
        if (activeStyle === "oddbar") renderInvite();
      }).catch(() => {
        oddbarFontLoading = false;
      });
    }

    function ensureAllboxFontLoaded() {
      if (!document.fonts || allboxFontLoaded || allboxFontLoading) return;
      allboxFontLoading = true;
      document.fonts.load(allboxFontLoadSpec, "올더박스파라다이스 나랑 갇히러 갈사람").then((loadedFaces) => {
        allboxFontLoaded = loadedFaces.length > 0;
        allboxFontLoading = false;
        if (activeStyle === "allbox") renderInvite();
      }).catch(() => {
        allboxFontLoading = false;
      });
    }

    function ensureDearfriendFontsLoaded() {
      if (!document.fonts || dearfriendFontLoaded || dearfriendFontLoading) return;
      dearfriendFontLoading = true;
      Promise.all([
        document.fonts.load(dearfriendTitleLoadSpec, "디어마이프렌드 초대장"),
        document.fonts.load(dearfriendBodyLoadSpec, "나랑 갇히러 갈사람")
      ]).then((results) => {
        dearfriendFontLoaded = results.every((faces) => faces.length > 0);
        dearfriendFontLoading = false;
        if (activeStyle === "dearfriend") renderInvite();
      }).catch(() => {
        dearfriendFontLoading = false;
      });
    }

    function renderInvite() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (activeStyle === "napolitan") {
        drawNapolitanPoster();
      } else if (activeStyle === "memory") {
        drawMemoryPoster();
      } else if (activeStyle === "oddbar") {
        ensureOddbarFontLoaded();
        drawOddbarPoster();
      } else if (activeStyle === "allbox") {
        ensureAllboxFontLoaded();
        drawAllboxPoster();
      } else if (activeStyle === "dearfriend") {
        ensureDearfriendFontsLoaded();
        drawDearfriendPoster();
      } else {
        drawShortlinePoster();
      }
    }

    function safeFileName(text) {
      return text
        .trim()
        .replace(/[\\/:*?"<>|]/g, "")
        .replace(/\s+/g, "-")
        .slice(0, 28) || "escape-invitation";
    }

    function saveCanvas() {
      canvas.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = `${safeFileName(titleValue() || "나랑 갇히러 갈사람")}.png`;
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        window.setTimeout(() => URL.revokeObjectURL(url), 1000);
        setStatus("PNG 저장 완료", false);
      }, "image/png");
    }

    async function copyCanvas() {
      if (!navigator.clipboard || !window.ClipboardItem) {
        setStatus("복사 미지원 브라우저");
        return;
      }
      canvas.toBlob(async (blob) => {
        try {
          await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
          setStatus("이미지 복사 완료");
        } catch (error) {
          setStatus("복사 권한 확인 필요");
        }
      }, "image/png");
    }

    Object.values(fields).forEach((field) => {
      field.addEventListener("input", () => {
        renderInvite();
        markChanged();
      });
    });

    styleButtons.forEach((button) => {
      button.addEventListener("click", () => {
        activeStyle = button.dataset.style;
        styleButtons.forEach((item) => {
          const isActive = item === button;
          item.classList.toggle("is-active", isActive);
          item.setAttribute("aria-pressed", String(isActive));
        });
        renderInvite();
        markChanged();
      });
    });

    addEntryButton.addEventListener("click", () => {
      createEntry();
      markChanged();
    });
    saveButton.addEventListener("click", saveCanvas);
    copyButton.addEventListener("click", copyCanvas);
    resetButton.addEventListener("click", () => {
      if (!window.confirm("입력한 내용을 초기화할까요?")) return;
      fields.inviteTitle.value = "";
      entryList.innerHTML = "";
      nextEntryId = 1;
      createEntry();
      renderInvite();
      markChanged();
    });

    createEntry();
    renderInvite();
    if (document.fonts) {
      document.fonts.ready.then(renderInvite);
    }
  </script>

<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>나랑 갇히러 갈사람</title>
  <style>
    @font-face {
      font-family: "Nanum Myeongjo";
      src: url("./fonts/NanumMyeongjo.otf") format("opentype");
      font-weight: 400 900;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Pretendard";
      src: url("./fonts/Pretendard-Regular.woff2") format("woff2");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Pretendard Bold";
      src: url("./fonts/Pretendard-Bold.woff2") format("woff2");
      font-weight: 700 900;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Museum Classic B";
      src: url("./fonts/MuseumClassicB.otf") format("opentype");
      font-weight: 700 900;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Museum Classic M";
      src: url("./fonts/MuseumClassicM.otf") format("opentype");
      font-weight: 400 700;
      font-style: normal;
      font-display: swap;
    }

    :root {
      color-scheme: light;
      --bg: #f6f6f2;
      --ink: #20201d;
      --muted: #68665f;
      --line: #d7d3c8;
      --panel: #ffffff;
      --panel-2: #efede6;
      --red: #b43c36;
      --teal: #1f756f;
      --gold: #b9822f;
      --black: #151512;
      --focus: 0 0 0 3px rgba(31, 117, 111, .24);
      font-family: "Nanum Myeongjo", "Malgun Gothic", "Apple SD Gothic Neo", serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(90deg, rgba(32, 32, 29, .018) 1px, transparent 1px) 0 0 / 42px 42px,
        linear-gradient(rgba(32, 32, 29, .015) 1px, transparent 1px) 0 0 / 42px 42px,
        var(--bg);
      color: var(--ink);
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(320px, 400px) minmax(0, 1fr);
      grid-template-rows: minmax(0, 1fr) auto;
    }

    .controls {
      min-height: 0;
      padding: 28px;
      background: var(--panel);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    .brand-mark {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 1.35rem;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .brand-kicker {
      margin: 0 0 4px;
      color: var(--muted);
      font-size: .86rem;
      font-weight: 750;
      line-height: 1.3;
    }

    .brand small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: .84rem;
      line-height: 1.4;
    }

    .field-group {
      display: grid;
      gap: 14px;
    }

    .section-title {
      margin: 0 0 2px;
      font-size: .82rem;
      letter-spacing: .08em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .entry-list {
      display: grid;
      gap: 12px;
    }

    .entry-card {
      border: 1px solid #d8d1c4;
      border-radius: 8px;
      background: #fbfaf6;
      padding: 14px;
      display: grid;
      gap: 12px;
      box-shadow: 0 1px 0 rgba(32, 32, 29, .04);
    }

    .entry-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .entry-title {
      color: var(--muted);
      font-size: .82rem;
      font-weight: 800;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .entry-fields {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
    }

    .entry-fields .field {
      min-width: 0;
      gap: 5px;
    }

    .entry-fields .field:nth-child(3) {
      max-width: 150px;
    }

    .entry-fields label {
      font-size: .84rem;
    }

    .entry-fields input {
      min-height: 40px;
      padding: 8px 10px;
    }

    .remove-entry {
      width: 30px;
      height: 30px;
      min-height: 30px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #f7f4ed;
      color: #70685d;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: background .16s ease, color .16s ease, border-color .16s ease;
    }

    .remove-entry:hover {
      background: #eee7dd;
      border-color: #c9bdad;
      color: var(--ink);
    }

    label {
      color: #35332e;
      font-size: .92rem;
      font-weight: 700;
    }

    input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: #fbfaf6;
      color: var(--ink);
      outline: none;
      transition: border-color .16s ease, box-shadow .16s ease, background .16s ease;
    }

    input:focus {
      border-color: var(--teal);
      box-shadow: var(--focus);
      background: #ffffff;
    }

    .style-options {
      display: grid;
      gap: 9px;
    }

    .style-option {
      position: relative;
      min-height: 58px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfaf6;
      color: var(--ink);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      font-weight: 850;
      text-align: left;
      transition: border-color .16s ease, background .16s ease, color .16s ease, transform .16s ease;
    }

    .style-option:hover {
      transform: translateY(-1px);
      border-color: rgba(32, 32, 29, .4);
    }

    .style-option.is-active {
      background: #1d1917;
      color: #fffaf0;
      border-color: #b98258;
      box-shadow: inset 0 0 0 2px rgba(217, 173, 85, .38);
    }

    .style-option.is-active::after {
      content: "";
      width: 8px;
      height: 14px;
      border-right: 2px solid #fffaf0;
      border-bottom: 2px solid #fffaf0;
      transform: rotate(45deg);
      margin-left: 2px;
    }

    .style-swatch {
      width: 54px;
      height: 28px;
      border-radius: 6px;
      background: linear-gradient(90deg, #0f7774 0 36%, #8f2f37 36% 68%, #d3b98f 68%);
      box-shadow: inset 0 0 0 2px rgba(0, 0, 0, .35);
      flex: 0 0 auto;
    }

    .style-swatch.memory {
      background: linear-gradient(90deg, #f8ead6 0 42%, #56321f 42% 72%, #c99a6c 72%);
    }

    .style-swatch.napolitan {
      background: linear-gradient(90deg, #1a0503 0 24%, #7a0502 24% 66%, #7a4b24 66%);
    }

    .style-note {
      margin-left: auto;
      color: rgba(32, 32, 29, .54);
      font-size: .78rem;
      font-weight: 750;
    }

    .style-option.is-active .style-note {
      color: rgba(255, 250, 240, .58);
    }

    .remove-entry:focus-visible,
    .save-button:focus-visible,
    .icon-button:focus-visible,
    .style-option:focus-visible {
      outline: none;
      box-shadow: var(--focus);
    }

    .actions {
      grid-column: 1;
      grid-row: 2;
      display: grid;
      gap: 10px;
      padding: 18px 28px 28px;
      background: var(--panel);
      border-top: 1px solid var(--line);
      border-right: 1px solid var(--line);
    }

    .action-status {
      min-height: 20px;
      color: var(--muted);
      font-size: .86rem;
      line-height: 1.35;
      text-align: center;
    }

    .preview-hint {
      color: var(--muted);
      font-weight: 650;
      font-size: .88rem;
      line-height: 1.35;
      text-align: right;
    }

    .actions {
      border-top: 1px solid var(--line);
    }

    .save-button,
    .icon-button {
      min-height: 46px;
      border: 0;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      transition: transform .16s ease, filter .16s ease;
    }

    .save-button:hover,
    .icon-button:hover {
      transform: translateY(-1px);
    }

    .save-button:active,
    .icon-button:active {
      transform: translateY(0);
    }

    .save-button {
      background: var(--red);
      color: #fffaf0;
      font-weight: 800;
    }

    .icon-button {
      background: #e9e5da;
      color: var(--ink);
      font-weight: 750;
    }

    .reset-button {
      background: transparent;
      border: 1px solid #e3ded3;
      color: var(--muted);
      font-weight: 700;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    svg {
      flex: 0 0 auto;
    }

    .stage {
      grid-column: 2;
      grid-row: 1 / span 2;
      min-width: 0;
      min-height: 100vh;
      padding: 28px;
      display: grid;
      place-items: center;
    }

    .preview-shell {
      width: min(100%, 760px);
      display: grid;
      gap: 14px;
    }

    .preview-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: .9rem;
    }

    .preview-size {
      color: #34322e;
      font-weight: 750;
    }

    .canvas-frame {
      width: 100%;
      max-height: calc(100vh - 100px);
      aspect-ratio: 4 / 5;
      border: 1px solid rgba(32, 32, 29, .22);
      border-radius: 8px;
      overflow: hidden;
      background: #171714;
      box-shadow: 0 22px 60px rgba(38, 35, 27, .18);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    @media (max-width: 980px) {
      .app {
        display: flex;
        flex-direction: column;
      }

      .controls {
        min-height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .stage {
        order: 2;
        min-height: auto;
        padding-top: 18px;
      }

      .canvas-frame {
        max-height: none;
      }

      .actions {
        order: 3;
        padding: 18px 28px 28px;
        border-right: 0;
      }
    }

    @media (max-width: 560px) {
      .controls,
      .stage {
        padding: 18px;
      }

      .brand {
        align-items: flex-start;
      }

      .button-row {
        grid-template-columns: 1fr 1fr;
      }

      .preview-toolbar {
        align-items: center;
        flex-direction: row;
      }

      .preview-hint {
        text-align: right;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="controls" aria-label="초대장 입력">
      <header class="brand">
        <div class="brand-mark">
          <div>
            <p class="brand-kicker">방탈출 초대장 이미지 생성기</p>
            <h1>나랑 갇히러 갈사람</h1>
            <small>By 달물결</small>
          </div>
        </div>
      </header>

      <div class="field-group">
        <p class="section-title">Invitation</p>
        <div class="field">
          <label for="inviteTitle">초대장 제목</label>
          <input id="inviteTitle" maxlength="34" placeholder="초대합니다" autocomplete="off">
        </div>
      </div>

      <div class="field-group">
        <p class="section-title">Rooms</p>
        <div class="entry-list" id="entryList" aria-label="매장, 테마, 가격 목록"></div>
        <button class="icon-button" type="button" id="addEntryButton" title="항목 추가">
          <svg width="17" height="17" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          </svg>
          항목 추가
        </button>
      </div>

      <div class="field-group">
        <p class="section-title">Style</p>
        <div class="style-options" role="group" aria-label="초대장 스타일 선택">
          <button class="style-option is-active" type="button" data-style="napolitan" aria-pressed="true">
            <span class="style-swatch napolitan" aria-hidden="true"></span>
            나폴리탄
            <span class="style-note">red frame</span>
          </button>
          <button class="style-option" type="button" data-style="memory" aria-pressed="false">
            <span class="style-swatch memory" aria-hidden="true"></span>
            메모리컴퍼니
            <span class="style-note">memory ticket</span>
          </button>
          <button class="style-option" type="button" data-style="shortline" aria-pressed="false">
            <span class="style-swatch" aria-hidden="true"></span>
            단편선
            <span class="style-note">ink poster</span>
          </button>
        </div>
      </div>

    </section>

    <section class="stage" aria-label="초대장 미리보기">
      <div class="preview-shell">
        <div class="preview-toolbar">
          <span class="preview-size">1080 × 1350 PNG</span>
          <span class="preview-hint">입력 즉시 반영</span>
        </div>
        <div class="canvas-frame">
          <canvas id="inviteCanvas" width="1080" height="1350" aria-label="생성된 방탈출 초대장"></canvas>
        </div>
      </div>
    </section>

    <section class="actions" aria-label="이미지 저장과 복사">
      <div class="action-status" id="statusText" aria-live="polite">미리보기 준비됨</div>
      <button class="save-button" type="button" id="saveButton">
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 3v11m0 0 4-4m-4 4-4-4M5 19h14" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        PNG 저장
      </button>
      <div class="button-row">
        <button class="icon-button" type="button" id="copyButton" title="이미지 복사">
          <svg width="17" height="17" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 8h11v11H8zM5 16V5h11" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          </svg>
          복사
        </button>
        <button class="icon-button reset-button" type="button" id="resetButton" title="기본값 복원">
          <svg width="17" height="17" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 12a8 8 0 1 0 2.3-5.7M4 5v5h5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          초기화
        </button>
      </div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("inviteCanvas");
    const ctx = canvas.getContext("2d");
    const fields = {
      inviteTitle: document.getElementById("inviteTitle")
    };
    const entryList = document.getElementById("entryList");
    const addEntryButton = document.getElementById("addEntryButton");
    const statusText = document.getElementById("statusText");
    const saveButton = document.getElementById("saveButton");
    const copyButton = document.getElementById("copyButton");
    const resetButton = document.getElementById("resetButton");
    const styleButtons = [...document.querySelectorAll("[data-style]")];
    const memoryBorderImage = new Image();
    memoryBorderImage.decoding = "async";
    memoryBorderImage.src = "./assets/memory-company-border-upscaled.png";
    memoryBorderImage.addEventListener("load", () => renderInvite());
    const napolitanFrameImage = new Image();
    napolitanFrameImage.decoding = "async";
    napolitanFrameImage.src = "./assets/napolitan-frame-upscaled.png";
    napolitanFrameImage.addEventListener("load", () => renderInvite());

    let nextEntryId = 1;
    let activeStyle = "napolitan";

    const palette = {
      ink: "#20201d",
      softInk: "#34302a",
      paper: "#f3ede1",
      paper2: "#fffaf0",
      brass: "#c08a36",
      red: "#b43c36",
      teal: "#1f756f",
      smoke: "#151512"
    };

    function titleValue() {
      return fields.inviteTitle.value.trim();
    }

    function displayTitle() {
      return titleValue() || fields.inviteTitle.placeholder;
    }

    function createEntry(values = {}) {
      const entry = document.createElement("div");
      entry.className = "entry-card";
      entry.dataset.entryId = String(nextEntryId);
      entry.innerHTML = `
        <div class="entry-header">
          <span class="entry-title">ROOM ${String(nextEntryId).padStart(2, "0")}</span>
          <button class="remove-entry" type="button" title="항목 삭제" aria-label="항목 삭제">
            <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 6l12 12M18 6 6 18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <div class="entry-fields">
          <div class="field">
            <label>매장</label>
            <input data-field="store" maxlength="36" placeholder="매장명" autocomplete="off">
          </div>
          <div class="field">
            <label>테마</label>
            <input data-field="theme" maxlength="38" placeholder="테마명" autocomplete="off">
          </div>
          <div class="field">
            <label>가격</label>
            <input data-field="price" maxlength="28" placeholder="가격" autocomplete="off">
          </div>
        </div>
      `;
      nextEntryId += 1;
      entryList.appendChild(entry);

      entry.querySelector('[data-field="store"]').value = values.store || "";
      entry.querySelector('[data-field="theme"]').value = values.theme || "";
      entry.querySelector('[data-field="price"]').value = values.price || "";
      entry.querySelectorAll("input").forEach((input) => {
        input.addEventListener("input", () => {
          renderInvite();
          markChanged();
        });
      });
      entry.querySelector(".remove-entry").addEventListener("click", () => {
        if (entryList.children.length === 1) {
          entry.querySelectorAll("input").forEach((input) => {
            input.value = "";
          });
        } else {
          const label = entry.querySelector(".entry-title").textContent;
          if (!window.confirm(`${label} 삭제할까요?`)) return;
          entry.remove();
          renumberEntries();
        }
        renderInvite();
        markChanged();
      });

      renumberEntries();
      renderInvite();
    }

    function renumberEntries() {
      [...entryList.children].forEach((entry, index) => {
        entry.querySelector(".entry-title").textContent = `ROOM ${String(index + 1).padStart(2, "0")}`;
      });
    }

    function getEntries() {
      return [...entryList.querySelectorAll(".entry-card")]
        .map((entry) => ({
          store: entry.querySelector('[data-field="store"]').value.trim(),
          theme: entry.querySelector('[data-field="theme"]').value.trim(),
          price: entry.querySelector('[data-field="price"]').value.trim()
        }))
        .filter((entry) => entry.store || entry.theme || entry.price);
    }

    function displayEntries() {
      const entries = getEntries();
      return entries.length ? entries : [{
        store: "매장명",
        theme: "테마명",
        price: "가격",
        placeholder: true
      }];
    }

    function setStatus(message, autoReset = true) {
      statusText.textContent = message;
      window.clearTimeout(setStatus.timer);
      if (autoReset) {
        setStatus.timer = window.setTimeout(() => {
          statusText.textContent = "미리보기 준비됨";
        }, 1800);
      }
    }

    function markChanged() {
      setStatus("저장 전 변경 있음", false);
    }

    function hexToRgb(hex) {
      const clean = hex.replace("#", "");
      return {
        r: parseInt(clean.slice(0, 2), 16),
        g: parseInt(clean.slice(2, 4), 16),
        b: parseInt(clean.slice(4, 6), 16)
      };
    }

    function rgba(hex, alpha) {
      const rgb = hexToRgb(hex);
      return `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${alpha})`;
    }

    function fillRoundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
      ctx.fill();
    }

    function strokeRoundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
      ctx.stroke();
    }

    const inviteFont = '"Nanum Myeongjo", "Batang", "Malgun Gothic", serif';
    const memoryFont = '"Pretendard", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif';
    const memoryTitleFont = '"Pretendard Bold", "Pretendard", "Malgun Gothic", sans-serif';
    const napolitanTitleFont = '"Museum Classic B", "Nanum Myeongjo", "Batang", serif';
    const napolitanBodyFont = '"Museum Classic M", "Nanum Myeongjo", "Batang", serif';

    function drawText(text, x, y, options = {}) {
      const {
        size = 44,
        weight = 700,
        color = palette.paper2,
        align = "left",
        baseline = "alphabetic",
        family = inviteFont
      } = options;
      ctx.font = `${weight} ${size}px ${family}`;
      ctx.fillStyle = color;
      ctx.textAlign = align;
      ctx.textBaseline = baseline;
      ctx.fillText(text, x, y);
    }

    function fitSize(text, maxWidth, baseSize, minSize, weight = 800, family = inviteFont) {
      let size = baseSize;
      while (size > minSize) {
        ctx.font = `${weight} ${size}px ${family}`;
        if (ctx.measureText(text).width <= maxWidth) return size;
        size -= 2;
      }
      return minSize;
    }

    function wrapLines(text, maxWidth, size, weight = 800, family = inviteFont) {
      ctx.font = `${weight} ${size}px ${family}`;
      const chars = [...text];
      const lines = [];
      let current = "";
      chars.forEach((char) => {
        const test = current + char;
        if (ctx.measureText(test).width > maxWidth && current) {
          lines.push(current);
          current = char.trimStart();
        } else {
          current = test;
        }
      });
      if (current) lines.push(current);
      return lines.slice(0, 3);
    }

    function drawCenteredWrapped(text, x, y, maxWidth, baseSize, minSize, lineGap, color, family = inviteFont, weight = 800) {
      let size = baseSize;
      let lines = wrapLines(text, maxWidth, size, weight, family);
      while ((lines.length > 2 || lines.some((line) => {
        ctx.font = `${weight} ${size}px ${family}`;
        return ctx.measureText(line).width > maxWidth;
      })) && size > minSize) {
        size -= 2;
        lines = wrapLines(text, maxWidth, size, weight, family);
      }
      ctx.font = `${weight} ${size}px ${family}`;
      ctx.fillStyle = color;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      const total = (lines.length - 1) * (size + lineGap);
      lines.forEach((line, index) => {
        ctx.fillText(line, x, y - total / 2 + index * (size + lineGap));
      });
    }

    function drawSpacedText(text, x, y, spacing, options = {}) {

        family = memoryFont

      ctx.fillStyle = color;
      ctx.textBaseline = baseline;
      const width = [...text].reduce((sum, char, index) => sum + ctx.measureText(char).width + (index ? spacing : 0), 0);
      let cursor = align === "center" ? x - width / 2 : align === "right" ? x - width : x;
      [...text].forEach((char, index) => {
        if (index) cursor += spacing;
        ctx.fillText(char, cursor, y);
        cursor += ctx.measureText(char).width;
      });
      ctx.restore();
    }

    function roughLine(x1, y1, x2, y2, color, width = 2, jitter = 1.4) {
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      for (let i = 1; i <= 7; i += 1) {
        const t = i / 7;
        const wobble = Math.sin(i * 12.31 + x1 * .01 + y2 * .01) * jitter;
        ctx.lineTo(x1 + (x2 - x1) * t + wobble, y1 + (y2 - y1) * t - wobble * .6);
      }
      ctx.stroke();
      ctx.restore();
    }

    function hatchRect(x, y, w, h, step, color, alpha = 1, angle = 0, width = 2) {
      ctx.save();
      ctx.beginPath();
      ctx.rect(x, y, w, h);
      ctx.clip();
      ctx.translate(x + w / 2, y + h / 2);
      ctx.rotate(angle);
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      const span = Math.max(w, h) * 1.6;
      for (let line = -span; line <= span; line += step) {
        ctx.beginPath();
        ctx.moveTo(-span, line);
        ctx.lineTo(span, line + Math.sin(line * .03) * 3);
        ctx.stroke();
      }
      ctx.restore();
    }

      ctx.drawImage(image, iw - sm, sm, sm, centerSh, dx + dw - tm, dy + tm, tm, centerDh);

      ctx.shadowColor = "transparent";
      ctx.strokeStyle = c.ink;
      ctx.lineWidth = 6;
      strokeRoundRect(x, y, w, h, 8);
      ctx.lineWidth = 2;
      ctx.strokeStyle = c.softTan;
      strokeRoundRect(x + 15, y + 15, w - 30, h - 30, 5);
      hatchRect(x + 20, y + 20, w - 40, h - 40, 14, c.ink, .08, -.42, 1.1);

      drawSpacedText("ROOM LIST", x + w / 2, y + 48, 5, {
        size: 24,
        weight: 800,
        color: c.ink,
        family: memoryFont
      });
      roughLine(x + 52, y + 78, x + w - 52, y + 78, c.ink, 2.4, .6);

      entries.slice(0, 4).forEach((entry, index) => {
        const rowY = y + 122 + index * 54;
        const store = entry.store || "매장명";
        const theme = entry.theme || "테마명";
        const price = entry.price || "가격";
        const muted = entry.placeholder ? "rgba(86, 50, 31, .48)" : "rgba(86, 50, 31, .68)";
        const strong = entry.placeholder ? "rgba(86, 50, 31, .54)" : c.dark;

        ctx.fillStyle = index % 2 === 0 ? "rgba(116, 69, 38, .1)" : "rgba(201, 154, 108, .16)";
        fillRoundRect(x + 36, rowY - 25, w - 72, 46, 4);
        ctx.fillStyle = c.ink;
        ctx.fillRect(x + 50, rowY - 21, 4, 38);
        drawText(String(index + 1).padStart(2, "0"), x + 74, rowY - 2, {
          size: 18,
          weight: 800,
          color: c.ink,
          align: "left",
          baseline: "middle",
          family: memoryFont
        });
        drawText(theme, x + 120, rowY - 9, {
          size: fitSize(theme, 340, 27, 18, 800, memoryFont),
          weight: 800,
          color: strong,
          align: "left",
          baseline: "middle",
          family: memoryFont
        });
        drawText(store, x + 122, rowY + 14, {
          size: fitSize(store, 330, 16, 12, 700, memoryFont),
          weight: 700,
          color: muted,
          align: "left",
          baseline: "middle",
          family: memoryFont
        });
        drawText(price, x + w - 55, rowY + 2, {
          size: fitSize(price, 132, 21, 14, 800, memoryFont),
          weight: 800,
          color: c.ink,
          align: "right",
          baseline: "middle",
          family: memoryFont
        });
      });

      if (entries.length > 4) {
        drawText(`외 ${entries.length - 4}개 더`, x + w / 2, y + h - 25, {
          size: 17,
          weight: 800,
          color: c.ink,
          align: "center",
          baseline: "middle",
          family: memoryFont
        });
      }
      ctx.restore();
    }

    function drawMemoryRibbon(text) {
      const c = memory;
      ctx.save();
      ctx.strokeStyle = c.ink;
      ctx.fillStyle = c.cream;
      ctx.lineJoin = "round";
      ctx.lineCap = "round";
      ctx.lineWidth = 6;

      ctx.beginPath();
      ctx.moveTo(234, 818);
      ctx.quadraticCurveTo(540, 770, 846, 818);
      ctx.lineTo(814, 912);
      ctx.quadraticCurveTo(540, 960, 266, 912);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(234, 818);
      ctx.lineTo(158, 848);
      ctx.lineTo(224, 878);
      ctx.lineTo(266, 912);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(846, 818);
      ctx.lineTo(922, 848);
      ctx.lineTo(856, 878);
      ctx.lineTo(814, 912);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      hatchRect(174, 824, 732, 104, 11, c.ink, .09, -.5, 1.1);
      drawCenteredWrapped(text, 540, 870, 520, 54, 26, 4, c.ink, memoryFont, 900);
      ctx.restore();
    }

    function drawMemoryPaperGrain() {
      ctx.save();
      ctx.globalAlpha = .13;
      for (let i = 0; i < 3000; i += 1) {
        const x = (i * 79) % canvas.width;
        const y = (i * 137) % canvas.height;
        ctx.fillStyle = i % 2 === 0 ? "#6f4429" : "#fff7e8";
        ctx.fillRect(x, y, 1, 1);
      }
      ctx.restore();
    }

    function drawMemoryTitle() {
      const c = memory;
      drawCenteredWrapped(displayTitle(), 540, 284, 650, 58, 30, 6, c.ink, memoryTitleFont, 900);
    }

    function drawMemoryFooter() {
      const c = memory;
      drawText("나랑 갇히러 갈사람", 540, 1130, {
        size: 34,
        weight: 900,
        color: c.ink,
        align: "center",
        baseline: "middle",
        family: memoryTitleFont
      });
    }

    function drawMemoryPoster() {
      const c = memory;
      drawMemoryBorder(c);
      drawMemoryTitle();
      drawMemoryEntries(displayEntries());
      drawMemoryFooter();
      drawMemoryPaperGrain();
    }

    function drawShortlinePoster() {
      const c = shortline;
      const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
      bg.addColorStop(0, c.ink);
      bg.addColorStop(.52, "#120c0b");
      bg.addColorStop(1, "#0b0808");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawArchField();

      ctx.save();
      ctx.lineJoin = "round";
      ctx.strokeStyle = c.ink;
      ctx.lineWidth = 12;
      strokeRoundRect(52, 52, 976, 1246, 8);
      ctx.lineWidth = 4;
      ctx.strokeStyle = c.sand;
      strokeRoundRect(70, 70, 940, 1210, 8);
      ctx.lineWidth = 2;
      ctx.strokeStyle = "rgba(8, 6, 4, .72)";
      strokeRoundRect(88, 88, 904, 1174, 6);
      ctx.restore();

      drawCenteredWrapped(displayTitle(), 540, 164, 780, 76, 46, 8, c.cream);

      drawShortlineEntries(displayEntries());

      drawText("나랑 갇히러 갈사람", 540, 1192, {
        size: 40,
        weight: 900,
        color: c.paper,
        align: "center",
        baseline: "middle",
        family: inviteFont
      });

      drawPaperGrain();
    }

    function renderInvite() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (activeStyle === "napolitan") {
        drawNapolitanPoster();
      } else if (activeStyle === "memory") {
        drawMemoryPoster();
      } else {
        drawShortlinePoster();
      }
    }

    function safeFileName(text) {
      return text
        .trim()
        .replace(/[\\/:*?"<>|]/g, "")
        .replace(/\s+/g, "-")
        .slice(0, 28) || "escape-invitation";
    }

    function saveCanvas() {
      canvas.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = `${safeFileName(titleValue() || "나랑 갇히러 갈사람")}.png`;
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        window.setTimeout(() => URL.revokeObjectURL(url), 1000);
        setStatus("PNG 저장 완료", false);
      }, "image/png");
    }

    async function copyCanvas() {
      if (!navigator.clipboard || !window.ClipboardItem) {
        setStatus("복사 미지원 브라우저");
        return;
      }
      canvas.toBlob(async (blob) => {
        try {
          await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
          setStatus("이미지 복사 완료");
        } catch (error) {
          setStatus("복사 권한 확인 필요");
        }
      }, "image/png");
    }

    Object.values(fields).forEach((field) => {
      field.addEventListener("input", () => {
        renderInvite();
        markChanged();
      });
    });

    styleButtons.forEach((button) => {
      button.addEventListener("click", () => {
        activeStyle = button.dataset.style;
        styleButtons.forEach((item) => {
          const isActive = item === button;
          item.classList.toggle("is-active", isActive);
          item.setAttribute("aria-pressed", String(isActive));
        });
        renderInvite();
        markChanged();
      });
    });

    addEntryButton.addEventListener("click", () => {
      createEntry();
      markChanged();
    });
    saveButton.addEventListener("click", saveCanvas);
    copyButton.addEventListener("click", copyCanvas);
    resetButton.addEventListener("click", () => {
      if (!window.confirm("입력한 내용을 초기화할까요?")) return;
      fields.inviteTitle.value = "";
      entryList.innerHTML = "";
      nextEntryId = 1;
      createEntry();
      renderInvite();
      markChanged();
    });

    createEntry();
    renderInvite();
    if (document.fonts) {
      document.fonts.ready.then(renderInvite);
    }
  </script>
</body>
</html>
